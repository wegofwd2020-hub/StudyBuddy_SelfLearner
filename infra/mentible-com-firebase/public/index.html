<!doctype html>
<!--
  Fallback only. The hosting config redirects every path ("source": "**") to
  https://mambakkam.net/mentible, so this file is normally never served. It
  exists so Firebase Hosting has a non-empty `public` dir and to give a sane
  page if the redirect rule is ever removed. The meta-refresh + link mirror the
  redirect destination as a belt-and-suspenders fallback.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://mambakkam.net/mentible" />
    <title>Mentible</title>
  </head>
  <body>
    <p>Redirecting to <a href="https://mambakkam.net/mentible">Mentible</a>…</p>
  </body>
</html>

# StudyBuddy Q backend — tool configuration

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "."]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "B", "C4", "UP",
    "S",   # security
    "T20", # no print()
    "RUF",
]
ignore = [
    "E501",   # handled by formatter
    "B008",   # FastAPI Depends pattern
    "S101",   # assert in tests
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "T20"]

[tool.ruff.lint.isort]
known-first-party = ["backend"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under = 70
